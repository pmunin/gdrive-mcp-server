services:
  gdrive-mcp:
    build: .
    container_name: gdrive-mcp-server
    volumes:
      # Place gcp-oauth.keys.json here before first run.
      # OAuth tokens (.gdrive-server-credentials.json) are also saved here.
    - ${GCP_CREDENTIALS_PATH:-~/.config/gdrive-mcp}:/app/credentials

  gdrive-mcp-auth:
    # For manual re-auth only (e.g. token expired). Stop gdrive-mcp first, then:
    #   docker compose -f <this-file> run --rm -p 4242:4242 --profile auth gdrive-mcp-auth
    build: .
    container_name: gdrive-mcp-auth
    volumes:
    - ${GCP_CREDENTIALS_PATH:-~/.config/gdrive-mcp}:/app/credentials
    ports:
      - "${OAUTH_PORT:-4242}:${OAUTH_PORT:-4242}"
    environment:
      - OAUTH_PORT=${OAUTH_PORT:-4242}
    command: ["auth"]
    profiles: ["auth"]